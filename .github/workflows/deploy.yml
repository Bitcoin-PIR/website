name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check upstream audit references
        run: npm run audit:check

      - name: Resolve base path
        id: base
        run: |
          # For `<user>.github.io/<repo>/` deploys, Pages serves under /<repo>/.
          # The workflow pulls the repo name out of $GITHUB_REPOSITORY.
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/$repo_name/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        env:
          SITE_BASE: ${{ steps.base.outputs.base }}
          SITE_URL: https://${{ github.repository_owner }}.github.io
        run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
